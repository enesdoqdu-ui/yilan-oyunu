<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>NEON SNAKE: ULTIMATE PRO</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <style>
        :root {
            --neon-pink: #ff0055;
            --neon-blue: #00f2ff;
            --neon-purple: #7a00ff;
            --neon-green: #00ffcc;
            --neon-yellow: #ffcc00;
        }

        body { 
            margin: 0; background: #020205; color: var(--neon-blue); 
            font-family: 'Segoe UI', Roboto, sans-serif; overflow: hidden;
            touch-action: none; -webkit-user-select: none; user-select: none;
        }
        
        #ui { 
            position: absolute; top: env(safe-area-inset-top, 20px); left: 20px; 
            font-size: 14px; text-shadow: 0 0 10px var(--neon-blue); font-weight: bold; z-index: 10;
            background: rgba(0, 0, 0, 0.8); padding: 10px 15px; 
            border-radius: 12px; border: 1px solid rgba(0, 242, 255, 0.3);
            pointer-events: none; backdrop-filter: blur(5px);
        }

        .overlay {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; background: rgba(2, 2, 15, 0.98); 
            padding: 30px; border: 3px solid var(--neon-purple); 
            border-radius: 35px; box-shadow: 0 0 50px rgba(122, 0, 255, 0.5); 
            z-index: 20; width: 85%; max-width: 380px; display: none;
        }

        #startScreen { display: block; }
        
        h1 { color: var(--neon-pink); margin: 0 0 20px 0; font-size: 28px; letter-spacing: 3px; text-transform: uppercase; text-shadow: 0 0 15px var(--neon-pink); }
        
        .btn { 
            padding: 16px; font-size: 18px; cursor: pointer; 
            border: none; border-radius: 15px; font-weight: bold; 
            transition: all 0.2s ease; text-transform: uppercase; 
            width: 100%; margin-bottom: 12px; display: block;
        }
        .btn-start { background: var(--neon-green); color: #000; box-shadow: 0 0 20px var(--neon-green); }
        .btn-info { background: transparent; color: var(--neon-blue); border: 2px solid var(--neon-blue); }
        .btn-close { background: var(--neon-pink); color: #fff; margin-top: 10px; }
        
        .btn:active { transform: scale(0.95); }

        .guide-list { text-align: left; margin: 15px 0; font-size: 13px; color: #fff; }
        .guide-item { display: flex; align-items: center; margin-bottom: 8px; background: rgba(255,255,255,0.05); padding: 8px; border-radius: 10px; }
        .icon-box { width: 14px; height: 14px; margin-right: 10px; border: 2px solid; flex-shrink: 0; }

        #finalScore { font-size: 80px; color: #fff; font-weight: 900; margin: 10px 0; text-shadow: 0 0 30px var(--neon-purple); }
        
        canvas { display: block; touch-action: none; }
    </style>
</head>
<body>

<div id="ui">SKOR: 0 | EN İYİ: 0</div>

<div id="startScreen" class="overlay">
    <h1>SİSTEM: HAZIR</h1>
    <button class="btn btn-start" onclick="startGame()">BAŞLAT</button>
    <button class="btn btn-info" onclick="toggleGuide(true)">REHBER</button>
</div>

<div id="guideModal" class="overlay">
    <h1>REHBER</h1>
    <p style="font-size: 12px; color: #0ff;">Mobil: Kaydır | PC: WASD</p>
    <div class="guide-list">
        <div class="guide-item"><div class="icon-box" style="border-color: var(--neon-blue);"></div> <span>Normal (+1)</span></div>
        <div class="guide-item"><div class="icon-box" style="border-color: var(--neon-pink); background: var(--neon-pink);"></div> <span>Büyük (+5)</span></div>
        <div class="guide-item"><div class="icon-box" style="border-color: var(--neon-yellow);"></div> <span>Turbo (Hız)</span></div>
        <div class="guide-item"><div class="icon-box" style="border-color: #fff;"></div> <span>Mıknatıs</span></div>
        <div class="guide-item"><div class="icon-box" style="border-color: #0077ff;"></div> <span>Kalkan</span></div>
    </div>
    <button class="btn btn-close" onclick="toggleGuide(false)">KAPAT</button>
</div>

<div id="gameOver" class="overlay">
    <h1>SİSTEM KRİTİK</h1>
    <div id="finalScore">0</div>
    <button class="btn btn-start" onclick="restartGame()">TEKRAR DENE</button>
    <button class="btn btn-info" onclick="backToMenu()">ANA MENÜ</button>
</div>

<canvas id="game"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const GRID = 20;

let state = {
    snake: [], dir: {x: GRID, y: 0}, nextDir: {x: GRID, y: 0},
    food: null, score: 0, best: parseInt(localStorage.getItem("bestSnakePro")) || 0,
    obstacles: [], isRunning: false, isGameOver: false,
    powers: { turbo: false, magnet: false, shield: false },
    touchStart: null
};

function resize() {
    canvas.width = Math.floor(window.innerWidth / GRID) * GRID;
    canvas.height = Math.floor(window.innerHeight / GRID) * GRID;
}
window.addEventListener('resize', resize);
resize();

function getSafePos() {
    let p;
    do {
        p = {
            x: Math.floor(Math.random() * (canvas.width / GRID)) * GRID,
            y: Math.floor(Math.random() * (canvas.height / GRID)) * GRID
        };
    } while (p.y < 120 || state.snake.some(s => s.x === p.x && s.y === p.y));
    return p;
}

function spawnFood() {
    const types = ["normal", "normal", "big", "turbo", "magnet", "shield"];
    state.food = { ...getSafePos(), type: types[Math.floor(Math.random() * types.length)] };
}

function spawnObstacle() {
    state.obstacles.push(getSafePos());
    if (state.obstacles.length > 20) state.obstacles.shift();
}

function init() {
    state.snake = [];
    for(let i=4; i>=0; i--) state.snake.push({x: GRID*5 + i*GRID, y: GRID*10});
    state.dir = state.nextDir = {x: GRID, y: 0};
    state.score = 0; state.obstacles = [];
    state.powers = { turbo: false, magnet: false, shield: false };
    state.isGameOver = false;
    for (let i = 0; i < 5; i++) spawnObstacle();
    spawnFood();
}

function update() {
    if (!state.isRunning || state.isGameOver) return;

    state.dir = state.nextDir;
    let head = { x: state.snake[0].x + state.dir.x, y: state.snake[0].y + state.dir.y };

    if (head.x < 0) head.x = canvas.width - GRID;
    else if (head.x >= canvas.width) head.x = 0;
    if (head.y < 0) head.y = canvas.height - GRID;
    else if (head.y >= canvas.height) head.y = 0;

    if (state.snake.some(p => p.x === head.x && p.y === head.y)) return end();
    
    const obsIdx = state.obstacles.findIndex(o => o.x === head.x && o.y === head.y);
    if (obsIdx !== -1) {
        if (state.powers.shield) {
            state.powers.shield = false; state.obstacles.splice(obsIdx, 1);
        } else return end();
    }

    state.snake.unshift(head);

    if (head.x === state.food.x && head.y === state.food.y) {
        state.score += (state.food.type === "big" ? 5 : 1);
        if (state.food.type === "turbo") { state.powers.turbo = true; setTimeout(() => state.powers.turbo = false, 5000); }
        if (state.food.type === "magnet") { state.powers.magnet = true; setTimeout(() => state.powers.magnet = false, 7000); }
        if (state.food.type === "shield") state.powers.shield = true;
        if (state.score % 5 === 0) spawnObstacle();
        spawnFood();
    } else {
        state.snake.pop();
    }

    if (state.powers.magnet && state.food) {
        let dx = head.x - state.food.x; let dy = head.y - state.food.y;
        if (Math.abs(dx) < 140 && Math.abs(dy) < 140) {
            if (dx !== 0) state.food.x += Math.sign(dx) * GRID;
            if (dy !== 0) state.food.y += Math.sign(dy) * GRID;
        }
    }
}

function draw() {
    ctx.fillStyle = "#020205";
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    state.obstacles.forEach(o => {
        ctx.strokeStyle = varColor('--neon-pink'); ctx.lineWidth = 2;
        ctx.strokeRect(o.x+2, o.y+2, GRID-4, GRID-4);
    });

    state.snake.forEach((p, i) => {
        ctx.fillStyle = i === 0 ? "#fff" : `hsl(${180 + (i*5)}, 100%, 50%)`;
        ctx.fillRect(p.x+1, p.y+1, GRID-2, GRID-2);
    });

    if (state.food) {
        const colors = {normal:"#0ff", big:"#ff00ff", turbo:"#ffcc00", magnet:"#fff", shield:"#0077ff"};
        ctx.fillStyle = colors[state.food.type];
        ctx.shadowBlur = 15; ctx.shadowColor = ctx.fillStyle;
        ctx.fillRect(state.food.x+4, state.food.y+4, GRID-8, GRID-8);
        ctx.shadowBlur = 0;
    }
    
    if (state.score > state.best) { state.best = state.score; localStorage.setItem("bestSnakePro", state.best); }
    document.getElementById("ui").innerHTML = `SKOR: ${state.score} | EN İYİ: ${state.best}`;
}

function startGame() { document.getElementById("startScreen").style.display = "none"; init(); state.isRunning = true; }
function end() { state.isGameOver = true; document.getElementById("finalScore").innerText = state.score; document.getElementById("gameOver").style.display = "block"; }
function restartGame() { document.getElementById("gameOver").style.display = "none"; init(); state.isGameOver = false; }
function backToMenu() { document.getElementById("gameOver").style.display = "none"; document.getElementById("startScreen").style.display = "block"; state.isRunning = false; }
function toggleGuide(s) { document.getElementById("guideModal").style.display = s ? "block" : "none"; }
function varColor(n) { return getComputedStyle(document.documentElement).getPropertyValue(n).trim(); }

// --- MOBİL DOKUNMATİK KONTROLLER (SWIPE) ---
window.addEventListener('touchstart', e => {
    state.touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
}, { passive: false });

window.addEventListener('touchend', e => {
    if (!state.touchStart) return;
    let dx = e.changedTouches[0].clientX - state.touchStart.x;
    let dy = e.changedTouches[0].clientY - state.touchStart.y;
    
    if (Math.abs(dx) > Math.abs(dy)) { // Yatay kaydırma
        if (Math.abs(dx) > 30 && state.dir.x === 0) state.nextDir = { x: dx > 0 ? GRID : -GRID, y: 0 };
    } else { // Dikey kaydırma
        if (Math.abs(dy) > 30 && state.dir.y === 0) state.nextDir = { x: 0, y: dy > 0 ? GRID : -GRID };
    }
    state.touchStart = null;
}, { passive: false });

// PC KLAVYE KONTROLLERİ
window.addEventListener("keydown", e => {
    const k = e.key.toLowerCase();
    if ((k === "w" || k === "arrowup") && state.dir.y === 0) state.nextDir = { x: 0, y: -GRID };
    if ((k === "s" || k === "arrowdown") && state.dir.y === 0) state.nextDir = { x: 0, y: GRID };
    if ((k === "a" || k === "arrowleft") && state.dir.x === 0) state.nextDir = { x: -GRID, y: 0 };
    if ((k === "d" || k === "arrowright") && state.dir.x === 0) state.nextDir = { x: GRID, y: 0 };
});

function loop() { update(); draw(); setTimeout(loop, state.powers.turbo ? 50 : 90); }
loop();
</script>
</body>
</html>
